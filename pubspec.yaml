name: CraftyBay
description: "CraftyBay"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  get: ^4.7.2
  flutter_svg: ^2.2.1
  otp_text_field: ^1.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/logos/
    - assets/appicon/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/appicon/icon.png"
  min_sdk_android: 21
  
